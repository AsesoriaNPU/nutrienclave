<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriEnclave - Zen Boutique Full Preview</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --color-primary: #76D14B;
            --color-secondary: #2563EB;
            --color-text: #1B2733;
            --color-text-light: #64748B;
            --color-bg: #FFFFFF;
            --color-bg-alt: #F8F9FA;
            --color-border: #E2E8F0;
            --radius-card: 12px;
            --radius-pill: 999px;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        * {
            box-sizing: border-box;
        }

        .zen-card {
            background: white;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-card);
            padding: 1.5rem;
            transition: all 0.2s ease;
        }

        .zen-pill-button {
            border-radius: var(--radius-pill);
            padding: 0.75rem 1.75rem;
            border: 1px solid var(--color-primary);
            background: transparent;
            color: var(--color-text);
            font-weight: 400;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
        }

        .zen-pill-button.primary {
            background: var(--color-primary);
            color: white;
        }

        /* Loading Animation Background */
        .ring-container {
            position: relative;
            width: 180px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid #E2E8F0;
        }

        /* Utility Helpers */
        .flex {
            display: flex;
        }

        .flex-col {
            flex-direction: column;
        }

        .items-center {
            align-items: center;
        }

        .justify-center {
            justify-content: center;
        }

        .justify-between {
            justify-content: space-between;
        }

        .text-center {
            text-align: center;
        }

        .w-full {
            width: 100%;
        }

        .max-w-md {
            max-width: 28rem;
        }

        .max-w-xs {
            max-width: 20rem;
        }

        .p-6 {
            padding: 1.5rem;
        }

        .mb-2 {
            margin-bottom: 0.5rem;
        }

        .mb-4 {
            margin-bottom: 1rem;
        }

        .mb-12 {
            margin-bottom: 3rem;
        }

        .gap-2 {
            gap: 0.5rem;
        }

        .gap-4 {
            gap: 1rem;
        }

        .grid {
            display: grid;
        }

        .grid-cols-2 {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .space-y-6>*+* {
            margin-top: 1.5rem;
        }

        .text-sm {
            font-size: 0.875rem;
        }

        .text-xs {
            font-size: 0.75rem;
        }

        .font-light {
            font-weight: 300;
        }

        .font-extralight {
            font-weight: 200;
        }

        .tracking-tight {
            letter-spacing: -0.025em;
        }

        .tracking-widest {
            letter-spacing: 0.1em;
        }

        .uppercase {
            text-transform: uppercase;
        }

        .text-gray-400 {
            color: #9ca3af;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        // Custom Icon Component to handle Lucide in CDN
        const Icon = ({ name, size = 24, color = "currentColor", strokeWidth = 1 }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size, color: color, strokeWidth: strokeWidth }}></i>;
        };

        const Step1 = ({ onNext }) => (
            <motion.div
                initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0 }}
                className="min-h-screen flex flex-col items-center justify-center p-6 text-center"
            >
                <div className="mb-12 w-24 h-24 flex items-center justify-center border border-gray-100 rounded-full">
                    <Icon name="sparkles" size={48} color="#76D14B" />
                </div>
                <h1 className="text-3xl font-light mb-4">Tu Consejero Privado</h1>
                <p className="text-gray-400 mb-12 max-w-xs leading-relaxed">
                    Ciencia y precisión en la palma de tu mano. Tu IA analiza cada biomarcador para guiarte.
                </p>
                <div className="flex gap-2 mb-12">
                    <div className="w-2 h-2 rounded-full bg-[#76D14B]"></div>
                    <div className="w-2 h-2 rounded-full bg-gray-200"></div>
                    <div className="w-2 h-2 rounded-full bg-gray-200"></div>
                </div>
                <div className="w-full max-w-md flex justify-end">
                    <button className="text-[#76D14B] font-light" onClick={onNext}>Siguiente</button>
                </div>
            </motion.div>
        );

        const Step2 = ({ onNext, onPrev }) => (
            <motion.div
                initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0 }}
                className="min-h-screen flex flex-col items-center justify-center p-6 text-center"
            >
                <div className="mb-12 w-24 h-24 flex items-center justify-center border border-gray-100 rounded-full">
                    <Icon name="watch" size={48} color="#76D14B" />
                </div>
                <h1 className="text-3xl font-light mb-4">Sincronía Vital</h1>
                <p className="text-gray-400 mb-12 max-w-xs leading-relaxed">
                    Tus dispositivos alimentan tu Enclave. Sigue tu ritmo cardíaco, sueño y actividad en tiempo real.
                </p>
                <div className="flex gap-2 mb-12">
                    <div className="w-2 h-2 rounded-full bg-gray-200"></div>
                    <div className="w-2 h-2 rounded-full bg-[#76D14B]"></div>
                    <div className="w-2 h-2 rounded-full bg-gray-200"></div>
                </div>
                <div className="w-full max-w-md flex justify-between">
                    <button className="text-gray-300 font-light" onClick={onPrev}>Anterior</button>
                    <button className="text-[#76D14B] font-light" onClick={onNext}>Siguiente</button>
                </div>
            </motion.div>
        );

        const Step3 = ({ onNext, onPrev }) => (
            <motion.div
                initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0 }}
                className="min-h-screen flex flex-col items-center justify-center p-6 text-center"
            >
                <div className="mb-12 w-24 h-24 flex items-center justify-center border border-gray-100 rounded-full">
                    <Icon name="calendar" size={48} color="#76D14B" />
                </div>
                <h1 className="text-3xl font-light mb-4">Estrategia Diaria</h1>
                <p className="text-gray-400 mb-12 max-w-xs leading-relaxed">
                    Tu hoja de ruta hacia el bienestar. Accede a tu plan personalizado, recetas y metas cada día.
                </p>
                <div className="flex gap-2 mb-12">
                    <div className="w-2 h-2 rounded-full bg-gray-200"></div>
                    <div className="w-2 h-2 rounded-full bg-gray-200"></div>
                    <div className="w-2 h-2 rounded-full bg-[#76D14B]"></div>
                </div>
                <div className="w-full max-w-md flex justify-between">
                    <button className="text-gray-300 font-light" onClick={onPrev}>Anterior</button>
                    <button className="zen-pill-button primary" onClick={onNext}>Comenzar</button>
                </div>
            </motion.div>
        );

        const Dashboard = () => (
            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="min-h-screen bg-[#F8F9FA] pb-20">
                <header className="p-6 bg-white flex justify-between items-center border-b border-gray-100" style={{ position: 'sticky', top: 0, zIndex: 10 }}>
                    <h2 className="text-xl font-light uppercase tracking-widest">NutriEnclave</h2>
                    <div className="flex gap-4"><Icon name="bell" size={20} /><Icon name="user" size={20} /></div>
                </header>
                <main className="p-6 space-y-6 max-w-md mx-auto">
                    <div style={{ padding: '1rem 0' }}>
                        <h1 className="text-2xl font-extralight mb-1">Hola, Experto</h1>
                        <p className="text-xs text-gray-400">Tu Enclave está en perfecta armonía hoy.</p>
                    </div>
                    <motion.div initial={{ scale: 0.95 }} animate={{ scale: 1 }} className="zen-card flex flex-col items-center justify-center text-center py-10 relative">
                        <div style={{ position: 'relative', width: '160px', height: '160px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                            <svg style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', transform: 'rotate(-90deg)' }}>
                                <circle cx="80" cy="80" r="70" fill="none" stroke="#E2E8F0" strokeWidth="1" />
                                <circle cx="80" cy="80" r="70" fill="none" stroke="#76D14B" strokeWidth="1.5" strokeDasharray="440" strokeDashoffset="44" />
                            </svg>
                            <div className="text-5xl font-extralight tracking-tighter">92</div>
                        </div>
                        <div className="mt-4 text-xs uppercase tracking-widest text-[#76D14B] font-medium" style={{ marginTop: '1rem' }}>Bio-Enclave Score</div>
                    </motion.div>
                    <div className="grid grid-cols-2 gap-4">
                        <div className="zen-card p-4 flex flex-col gap-2">
                            <Icon name="activity" size={16} color="#76D14B" />
                            <div className="text-xs text-gray-400">Actividad</div>
                            <div className="text-lg font-light">8,432 <span className="text-xs">pasos</span></div>
                        </div>
                        <div className="zen-card p-4 flex flex-col gap-2">
                            <Icon name="flame" size={16} color="#2563EB" />
                            <div className="text-xs text-gray-400">Calorías</div>
                            <div className="text-lg font-light">1,240 <span className="text-xs">kcal</span></div>
                        </div>
                    </div>
                    <div className="p-4 rounded-xl border border-[#76D14B] border-opacity-20" style={{ backgroundColor: 'rgba(118, 209, 75, 0.05)' }}>
                        <p className="text-xs italic font-light leading-relaxed" style={{ margin: 0 }}>
                            "Tu ritmo circadiano muestra una mejora del 15%. Considera aumentar la ingesta de magnesio esta noche."
                        </p>
                    </div>
                </main>
                <nav className="fixed bottom-0 left-0 right-0 p-4 bg-white border-t border-gray-100 flex justify-around" style={{ position: 'fixed', bottom: 0, left: 0, right: 0, backgroundColor: 'rgba(255,255,255,0.8)', backdropFilter: 'blur(10px)' }}>
                    <Icon name="activity" size={24} color="#76D14B" />
                    <Icon name="calendar" size={24} color="#CBD5E1" />
                    <Icon name="user" size={24} color="#CBD5E1" />
                </nav>
            </motion.div>
        );

        const App = () => {
            const [view, setView] = useState('onboarding1');
            return (
                <AnimatePresence mode="wait">
                    {view === 'onboarding1' && <Step1 key="s1" onNext={() => setView('onboarding2')} />}
                    {view === 'onboarding2' && <Step2 key="s2" onNext={() => setView('onboarding3')} onPrev={() => setView('onboarding1')} />}
                    {view === 'onboarding3' && <Step3 key="s3" onNext={() => setView('dashboard')} onPrev={() => setView('onboarding2')} />}
                    {view === 'dashboard' && <Dashboard key="db" />}
                </AnimatePresence>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
